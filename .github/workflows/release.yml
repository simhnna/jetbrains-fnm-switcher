# Publishes the plugin when a version tag (e.g. v1.0.0) is pushed.
#
# Attaches the built distribution to a GitHub Release. Publishing to the
# JetBrains Marketplace is included but gated on the PUBLISH_TOKEN secret:
# create a token at https://plugins.jetbrains.com/author/me/tokens and add it
# as a repository secret named PUBLISH_TOKEN to enable that step.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & publish
    runs-on: ubuntu-latest
    # Lifted to job level so it is available in the publish step's `if` condition.
    env:
      PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
    steps:
      - name: Check out sources
        uses: actions/checkout@v7

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build plugin distribution
        run: ./gradlew buildPlugin

      - name: Attach distribution to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: build/distributions/*.zip
          generate_release_notes: true

      - name: Publish to JetBrains Marketplace
        if: ${{ env.PUBLISH_TOKEN != '' }}
        run: ./gradlew publishPlugin
