name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & verify plugin
    runs-on: ubuntu-latest
    steps:
      - name: Check out sources
        uses: actions/checkout@v7

      # Detect a tampered gradle-wrapper.jar before running it (supply-chain guard).
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run unit tests
        run: ./gradlew test

      - name: Build plugin distribution
        run: ./gradlew buildPlugin

      # Validates the built plugin against the recommended IDE builds
      # (configured via intellijPlatform.pluginVerification in build.gradle.kts).
      - name: Verify plugin
        run: ./gradlew verifyPlugin

      - name: Upload plugin distribution
        uses: actions/upload-artifact@v7
        with:
          name: plugin-distribution
          path: build/distributions/*.zip
          if-no-files-found: error

      - name: Upload test & verifier reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: reports
          path: |
            build/reports/tests/**
            build/reports/pluginVerifier/**
          if-no-files-found: ignore
